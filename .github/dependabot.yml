version: 2
updates:
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 15
  target-branch: master
- package-ecosystem: maven
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 15
  target-branch: master
  ignore:
  - dependency-name: "org.testng:testng"
    versions: ["> 7.9.0"]
